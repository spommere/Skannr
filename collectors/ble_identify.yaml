key: ble_identify
order: 40
label: BLE Identify
description: On-demand active BLE Device Information Service reader
source_group: bluetooth
source_group_label: Bluetooth
has_device_history: true
enabled: true
auto_start: false
primary_validation: test -d /sys/class/bluetooth/{preferred_adapter} || hciconfig {preferred_adapter} >/dev/null 2>&1
fallback_validation: test -d /sys/class/bluetooth/{fallback_adapter} || hciconfig {fallback_adapter} >/dev/null 2>&1 || bluetoothctl list | grep -q 'Controller '
validation_timeout_sec: 10
preferred_adapter: hci1
fallback_adapter: hci0
identify_timeout_sec: 10
identify_attempts: 3
identify_retry_delay_sec: 1.5
retry_interval_sec: 5
retry_timeout_sec: 30
