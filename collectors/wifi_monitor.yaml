key: wifi_monitor
order: 20
label: Wi-Fi Monitor
description: On-demand monitor-mode Wi-Fi packet capture and channel hopping
has_device_history: true
enabled: true
auto_start: false
validation_timeout_sec: 10
# auto chooses the best monitor-mode interface. ALFA/external USB adapters are
# preferred when their metadata is visible through sysfs.
interface: auto
interfaces: []
interface_regex: wlan|^mon
bands:
- '2.4'
- '5'
typical_channels_24:
- 1
- 6
- 11
typical_channels_5:
- 36
- 40
- 44
- 48
- 149
- 153
- 157
- 161
- 165
include_seen_channels: false
dwell_sec: 1
retry_interval_sec: 5
retry_timeout_sec: 30
