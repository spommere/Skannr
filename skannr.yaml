skannr:
  # Use 127.0.0.1 for local-only, 0.0.0.0 for all IPv4 interfaces, or ::
  # for IPv6. A specific Yggdrasil IPv6 address can be used here as well.
  host: 127.0.0.1
  port: 5000
  log_level: INFO
# Collector-specific settings live in collectors/<collector>.yaml.
persistence:
  backend: filesystem
  filesystem:
    log_dir: ./logs
    retention_days: 30
runtime:
  # Internal runtime knobs. Modify only if you know why; very small values can
  # increase CPU use or drop browser events under load.
  event_log_maxlen: 100
  sse_queue_size: 200
  system_status_interval_sec: 5
  shutdown_timeout_sec: 10
findings:
  enabled: true
  max_items: 200
  bootstrap_events: 1000
  strong_wifi_rssi: -50
  strong_wifi_ap_rssi: -45
  strong_ble_rssi: -55
  rssi_change_db: 12
  return_after_sec: 300
  lost_after_sec: 300
  burst_window_sec: 30
  burst_count: 5
  cooldown_sec: 120
  persistent_signal_sec: 60
history_analysis:
  new_device_window_sec: 3600
  strong_wifi_rssi: -50
  strong_ble_rssi: -55
  many_bssid_count: 2
  wifi_same_ap_bssid_prefix_bytes: 5
  wifi_same_ap_max_last_byte_span: 16
  many_probe_ssid_count: 5
  blank_probe_count: 10
  deauth_count: 5
  randomized_mac_count: 10
  ble_linger_sec: 3600
  ble_lost_count: 3
  ble_recurring_min_sessions: 3
  ble_recurring_window_min: 30
  recent_activity_window_sec: 1800
  wifi_short_lived_sec: 900
  sensitive_ssids: []
reports:
  ble_long_presence_sec: 3600
  ble_recurring_min_days: 2
  ble_strong_rssi: -55
  wifi_strong_rssi: -50
  wifi_many_bssid_count: 2
  wifi_monitor_event_count: 5
ui:
  max_live_rows: 200
  max_history_rows: 500
  max_event_log_items: 100
  max_rendered_findings: 1000
  max_history_ssids: 8
  derived_stale_after_min: 15
  insights_recent_after_min: 30
  wifi_signal_bands:
  - value: strong
    label: Strong (>= -60)
    min: -60
  - value: okay
    label: Okay (-60 to -70)
    min: -70
    max: -60
  - value: poor
    label: Poor (-70 to -80)
    min: -80
    max: -70
  - value: very_poor
    label: Very Poor (-80 or worse)
    max: -80
